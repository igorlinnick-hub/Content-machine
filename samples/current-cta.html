<!doctype html><html><head><meta charset=utf-8><style>
*{box-sizing:border-box;margin:0;padding:0}html,body{width:1080px;height:1350px}
body{position:relative;width:1080px;height:1350px;font-family:Inter,-apple-system,Arial,sans-serif;color:#ffffff;overflow:hidden;background:url('https://images.unsplash.com/photo-1582750433449-648ed127bb54?w=1080&q=80') center/cover no-repeat #1e3a8a;}
.card{position:absolute;bottom:64px;left:64px;right:64px;background:#1e3a8a;border-radius:20px;padding:56px 48px 64px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.22)}
.h{font-size:38px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;line-height:1.2;margin-bottom:24px}
.m{font-size:22px;font-weight:600;line-height:1.45;letter-spacing:.08em;text-transform:uppercase;opacity:.85;margin-bottom:28px}
.a{font-size:26px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;line-height:1.3}
</style></head><body>
<div class=card>
  <div class=h>STILL HAVE QUESTIONS?</div>
  <div class=m>OUR TEAM HAS HELPED 1,200+ PATIENTS</div>
  <div class=a>BOOK A CONSULTATION — LINK IN BIO</div>
</div></body></html>
