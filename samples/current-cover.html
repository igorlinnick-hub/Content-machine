<!doctype html><html><head><meta charset=utf-8><style>
*{box-sizing:border-box;margin:0;padding:0}html,body{width:1080px;height:1350px}
body{position:relative;width:1080px;height:1350px;font-family:Inter,-apple-system,Arial,sans-serif;background:#ffffff;color:#1e3a8a;overflow:hidden}
.glow{position:absolute;top:-25%;right:-20%;width:80%;height:80%;background:radial-gradient(closest-side,#3b82f655,transparent 70%)}
.glow-bottom{position:absolute;bottom:-25%;left:-25%;width:70%;height:70%;background:radial-gradient(closest-side,#3b82f633,transparent 70%)}
.frame{position:absolute;inset:0;padding:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.eyebrow{font-size:28px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;margin-bottom:56px}
.headline{font-size:96px;font-weight:800;line-height:1.05;text-transform:uppercase;letter-spacing:-.01em;white-space:pre-wrap}
.subhead{margin-top:64px;font-size:22px;font-weight:600;line-height:1.45;text-transform:uppercase;letter-spacing:.12em;max-width:60%;opacity:.85}
</style></head><body>
<div class=glow></div><div class=glow-bottom></div>
<div class=frame>
  <div class=eyebrow>TMS THERAPY</div>
  <div class=headline>HOW MAGNETIC
FIELDS CHANGE
DEPRESSION</div>
  <div class=subhead>A non-invasive, FDA-cleared treatment</div>
</div></body></html>
